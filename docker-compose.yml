services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_media_app
    ports:
      - "5432:5432"
    volumes:
      - smp_pg_data:/var/lib/postgresql/data

volumes:
  smp_pg_data:
